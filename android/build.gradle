buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

subprojects { subproject ->
    def forceLibcppShared = {
        subproject.android {
            defaultConfig {
                externalNativeBuild {
                    cmake {
                        arguments "-DCMAKE_CXX_STANDARD_LIBRARIES=-lc++_shared -latomic -lm"
                    }
                }
            }
        }
    }
    subproject.plugins.withId("com.android.library") { forceLibcppShared() }
    subproject.plugins.withId("com.android.application") { forceLibcppShared() }
}
